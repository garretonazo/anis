<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Libro — Un té de Anis</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <main class="container page">
    <div class="top-nav">
      <a href="/" class="top-nav-link">Lecturas</a>
      <a href="/anis" class="top-nav-link">Archivos</a>
    </div>

    <div class="book-page" id="book-page">

      <a href="/" class="back-link">← Volver</a>

      <div id="book-header" class="book-page-header">
        <div class="loading">Cargando...</div>
      </div>

      <div class="notes-section" id="notes-section" style="display:none">

        <!-- Formulario para agregar nota (solo owner) -->
        <div class="add-note-form" id="add-note-form">
          <textarea id="note-content" placeholder="Escribe tu idea, cita o mini-ensayo..."></textarea>
          <div class="form-row">
            <select id="note-type">
              <option value="idea">Idea</option>
              <option value="cita">Cita</option>
            </select>
            <button class="btn btn-primary" id="add-note-btn">Agregar nota</button>
          </div>
        </div>

        <!-- Tabs de filtro -->
        <div class="tabs">
          <button class="tab active" data-filter="all">Todo</button>
          <button class="tab" data-filter="cita">Citas</button>
        </div>

        <div class="notes-list" id="notes-list">
          <div class="loading">Cargando notas...</div>
        </div>

      </div>
    </div>
  </main>

  <script type="module" src="/js/book.js"></script>
</body>
</html>
