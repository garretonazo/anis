<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anis</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <main class="container page">

    <div class="top-nav">
      <a href="/" class="top-nav-link active">Lecturas</a>
      <a href="/anis" class="top-nav-link">Archivos</a>
      <button id="auth-btn" class="auth-btn">Entrar</button>
    </div>

    <section class="hero">
      <h1 class="hero-title">Anis</h1>
      <h2 class="hero-subtitle">Hola Anis! Hice esta página para que puedas ver el progreso de los libros que me has dado. En "Archivos" puedes subir pdfs de cosas que te llamen la atención. Abrazo!</h2>
    </section>

    <div class="books-list" id="books-list">
      <div class="loading">Cargando...</div>
    </div>

  </main>

  <!-- Modal progreso -->
  <div class="modal-overlay" id="progress-modal">
    <div class="modal">
      <p class="modal-title">Actualizar progreso</p>
      <form id="progress-form">
        <div>
          <label for="modal-title-display">Libro</label>
          <input type="text" id="modal-title-display" disabled />
        </div>
        <div>
          <label for="modal-pages-read">Páginas leídas</label>
          <input type="number" id="modal-pages-read" min="0" required />
        </div>
        <div>
          <label for="modal-total-pages">Total de páginas</label>
          <input type="number" id="modal-total-pages" min="1" required />
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" id="modal-cancel">Cancelar</button>
          <button type="submit" class="btn btn-primary">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal login -->
  <div class="modal-overlay" id="login-modal">
    <div class="modal">
      <p class="modal-title">Acceso</p>
      <form id="login-form">
        <div>
          <label for="login-password">Contraseña</label>
          <input type="password" id="login-password" autocomplete="current-password" />
        </div>
        <p id="login-error" style="color:var(--danger);font-size:.8rem;min-height:1.2em"></p>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" id="login-cancel">Cancelar</button>
          <button type="submit" class="btn btn-primary">Entrar</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
